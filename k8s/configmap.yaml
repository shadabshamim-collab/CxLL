apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-agent-config
  namespace: voice-agent
data:
  LLM_PROVIDER: "groq"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  TTS_PROVIDER: "deepgram"
  STT_MODEL: "nova-2"
  STT_LANGUAGE: "en"
  REDIS_URL: "redis://redis-svc.voice-agent.svc.cluster.local:6379"
  DASHBOARD_WEBHOOK_URL: "http://dashboard-svc.voice-agent.svc.cluster.local:3000/api/calls/webhook"
